name: datum
description: A powerful, offline-first data synchronization engine for Flutter
  and Dart, featuring relational data support, real-time queries, and
  intelligent conflict resolution.
version: 1.0.0
homepage: https://www.shreeman.dev
repository: https://github.com/Shreemanarjun/datum
issue_tracker: https://github.com/Shreemanarjun/datum/issues
documentation: https://datum.shreeman.dev/
funding:
  - https://buymeacoffee.com/shreemanarjun
screenshots:
  - description: 'LOGO Datum'
    path: logo/datum.webp

topics:
  - offline-first
  - synchronization
  - database
  - flutter
  - supabase

environment:
  sdk: '>=3.6.0 <4.0.0'

# This package supports all platforms listed below.
platforms:
  android:
  ios:
  linux:
  macos:
  web:
  windows:

resolution: workspace

dependencies:
  async: ^2.13.0
  async_queue: ^2.0.2
  collection: ^1.19.1
  compute: ^1.0.2
  crypto: ^3.0.6
  equatable: ^2.0.7
  meta: ^1.16.0
  rxdart: ^0.28.0
  uuid: ^4.4.0

dev_dependencies:
  clock: ^1.1.2
  fake_async: ^1.3.3
  lints: ^4.0.0
  mocktail: ^1.0.4
  test: ^1.26.3
